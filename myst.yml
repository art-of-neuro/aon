version: 1

project:
  title: "Art of Neuron"
  authors:
    - name: "Rudramani Singha"
    - name: "Novak Chen"
  copyright: "2026"
  github: "https://github.com/art-of-neuron/art-of-neuron.github.io"
  bibliography:
    - references.bib
  plugins:
    - type: javascript
      path: plugins/hide-notebook-inputs.mjs
  toc:
    - file: index.md

    - title: "Part I: Foundations"
      children:
        - file: chapters/hello.ipynb

    - title: "Part II: Linear Algebra"
      children:
        - file: chapters/linear_algebra/linear_algebra_concepts.ipynb

site:
  template: book-theme
  title: "Art of Neuron"
  parts:
    primary_sidebar_footer: _site/primary_sidebar_footer.md
  options:
    favicon: images/favicon.ico
    logo: images/logo.png
    logo_alt: "logo"
    logo_text: "The Art of Neuron ∈ {math, models, systems, ...}"
    hide_authors: false
    analytics_google: ""
    analytics_plausible: ""